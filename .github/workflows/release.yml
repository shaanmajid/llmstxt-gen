name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must be on main. Commit $GITHUB_SHA is not an ancestor of origin/main."
            exit 1
          fi

      - name: Verify tag matches package version
        id: version
        run: |
          # Extract version from pyproject.toml
          pkg_version=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          # Extract version from git tag (strip leading 'v' if present)
          tag_version="${GITHUB_REF_NAME#v}"

          echo "Package version: $pkg_version"
          echo "Tag version: $tag_version"

          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Version mismatch: pyproject.toml has $pkg_version but tag is $tag_version"
            exit 1
          fi

          echo "version=$pkg_version" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test built package
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Install built wheel and test dependencies
        run: |
          uv sync --locked --only-group test
          uv pip install dist/*.whl --force-reinstall

      - name: Run smoke tests
        run: uv run --frozen pytest tests/test_smoke.py -v

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      id-token: write # Required for OIDC trusted publishing
      attestations: write # Required for artifact attestations
    environment:
      name: pypi
      url: https://pypi.org/project/llmstxt-standalone/${{ needs.build.outputs.version }}/
    steps:
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate attestations
        uses: astral-sh/attest-action@f35111fb79f1e4f0150a1ee16cfd4399e3151bdb # v0.0.5

      - name: Publish to PyPI
        run: uv publish

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish]
    permissions:
      contents: write # Required to create releases
      id-token: write # Required for OIDC
      attestations: write # Required for artifact attestations
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: dist/*

  verify:
    name: Verify installation
    runs-on: ubuntu-latest
    needs: [build, publish]
    steps:
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Wait for PyPI to index package
        run: sleep 30

      - name: Install from PyPI and verify
        env:
          EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Create a temporary project to install the package
          uv init --no-progress verify-install
          cd verify-install
          uv add "llmstxt-standalone==$EXPECTED_VERSION"

          # Verify the CLI is accessible and shows help
          uv run llmstxt-standalone --help

          # Verify version matches
          version_output=$(uv run llmstxt-standalone --version)
          echo "Version output: $version_output"
          echo "$version_output" | grep -q "$EXPECTED_VERSION" || {
            echo "::error::Version mismatch in installed package"
            exit 1
          }
